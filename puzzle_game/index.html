<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Character Sliding Puzzle</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .tile-transition {
            transition: transform 0.2s ease-in-out;
        }

        /* Custom Scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // -- Components --

        // Button Component
        const Button = ({ children, onClick, variant = 'primary', className = '' }) => {
            const baseStyle = "px-6 py-2 rounded-xl font-semibold transition-all duration-200 transform active:scale-95 shadow-md flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg hover:-translate-y-0.5",
                secondary: "bg-white text-indigo-600 border-2 border-indigo-100 hover:border-indigo-600 hover:bg-indigo-50",
                danger: "bg-rose-500 text-white hover:bg-rose-600 shadow-rose-200",
                ghost: "bg-transparent text-gray-500 hover:bg-gray-100 shadow-none"
            };
            return (
                <button
                    onClick={onClick}
                    className={`${baseStyle} ${variants[variant]} ${className}`}
                >
                    {children}
                </button>
            );
        };

        // Puzzle Game Component
        const PuzzleGame = () => {
            const [image, setImage] = useState(null); // The source image object
            const [gridSize, setGridSize] = useState(3); // 3, 4, 5
            const [tiles, setTiles] = useState([]); // Array of tile objects
            const [emptyIndex, setEmptyIndex] = useState(null); // Index of the empty tile
            const [isSolved, setIsSolved] = useState(false);
            const [moves, setMoves] = useState(0);
            const [time, setTime] = useState(0);
            const [gameState, setGameState] = useState('upload'); // 'upload', 'playing', 'won'
            const [showOriginal, setShowOriginal] = useState(false);

            const timerRef = useRef(null);

            // -- Game Logic Helpers --

            // Check if puzzle is solvable (Inversion Counting)
            const isSolvable = (tileOrder, size, emptyIdx) => {
                let inversions = 0;
                for (let i = 0; i < tileOrder.length; i++) {
                    for (let j = i + 1; j < tileOrder.length; j++) {
                        // Skip empty tile for inversion counting
                        if (tileOrder[i] !== size * size - 1 && tileOrder[j] !== size * size - 1 && tileOrder[i] > tileOrder[j]) {
                            inversions++;
                        }
                    }
                }

                if (size % 2 !== 0) {
                    // Odd grid size: solvable if inversions is even
                    return inversions % 2 === 0;
                } else {
                    // Even grid size
                    const emptyRowFromBottom = size - Math.floor(emptyIdx / size);
                    if (emptyRowFromBottom % 2 === 0) {
                        return inversions % 2 !== 0; // Even row from bottom -> odd inversions
                    } else {
                        return inversions % 2 === 0; // Odd row from bottom -> even inversions
                    }
                }
            };

            const shuffleTiles = (size) => {
                const totalTiles = size * size;
                let newTiles = Array.from({ length: totalTiles }, (_, i) => i);
                let currentEmptyIndex = totalTiles - 1;

                // Simple shuffle verification loop
                let solvable = false;
                while (!solvable) {
                    // Modern Fisher-Yates shuffle
                    for (let i = newTiles.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [newTiles[i], newTiles[j]] = [newTiles[j], newTiles[i]];
                    }

                    // Find empty tile index after shuffle
                    currentEmptyIndex = newTiles.indexOf(totalTiles - 1);

                    // Check solvability
                    solvable = isSolvable(newTiles, size, currentEmptyIndex);

                    // Also check it's not already solved (unlikely but possible)
                    const isAlreadySolved = newTiles.every((val, idx) => val === idx);
                    if (isAlreadySolved) solvable = false;
                }

                return { tiles: newTiles, emptyIndex: currentEmptyIndex };
            };

            // -- Event Handlers --

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            setImage(img);
                            setGameState('setup');
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };

            const startGame = () => {
                const { tiles: shuffledTiles, emptyIndex: newEmptyIndex } = shuffleTiles(gridSize);
                setTiles(shuffledTiles);
                setEmptyIndex(newEmptyIndex);
                setMoves(0);
                setTime(0);
                setIsSolved(false);
                setGameState('playing');

                // Clear any existing timer
                if (timerRef.current) clearInterval(timerRef.current);

                // Start Timer
                timerRef.current = setInterval(() => {
                    setTime(prev => prev + 1);
                }, 1000);
            };

            const handleTileClick = (index) => {
                if (gameState !== 'playing') return;

                const row = Math.floor(index / gridSize);
                const col = index % gridSize;
                const emptyRow = Math.floor(emptyIndex / gridSize);
                const emptyCol = emptyIndex % gridSize;

                // Check adjacency (up, down, left, right)
                const isAdjacent =
                    (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                    (Math.abs(col - emptyCol) === 1 && row === emptyRow);

                if (isAdjacent) {
                    const newTiles = [...tiles];
                    // Swap
                    [newTiles[index], newTiles[emptyIndex]] = [newTiles[emptyIndex], newTiles[index]];

                    setTiles(newTiles);
                    setEmptyIndex(index);
                    setMoves(prev => prev + 1);

                    // Check win condition
                    const isWin = newTiles.every((val, idx) => val === idx);
                    if (isWin) {
                        clearInterval(timerRef.current);
                        setIsSolved(true);
                        setGameState('won');
                    }
                }
            };

            const resetGame = () => {
                setImage(null);
                setGameState('upload');
                if (timerRef.current) clearInterval(timerRef.current);
            }

            // -- Render Helpers --

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // -- Render Sub-components --

            if (gameState === 'upload') {
                return (
                    <div className="glass-panel rounded-3xl p-10 max-w-md w-full text-center space-y-8 animate-fade-in">
                        <div className="space-y-2">
                            <h1 className="text-4xl font-bold text-indigo-900 tracking-tight">Puzzle<span className="text-indigo-500">Master</span></h1>
                            <p className="text-gray-500 font-medium">Upload your character to begin</p>
                        </div>

                        <div
                            className="border-3 border-dashed border-indigo-200 rounded-2xl p-10 cursor-pointer hover:bg-indigo-50 hover:border-indigo-400 transition-colors group"
                            onClick={() => document.getElementById('fileInput').click()}
                            onDragOver={(e) => e.preventDefault()}
                            onDrop={(e) => {
                                e.preventDefault();
                                const file = e.dataTransfer.files[0];
                                if (file) handleImageUpload({ target: { files: [file] } });
                            }}
                        >
                            <input
                                type="file"
                                id="fileInput"
                                accept="image/*"
                                className="hidden"
                                onChange={handleImageUpload}
                            />
                            <div className="flex flex-col items-center gap-4 text-indigo-300 group-hover:text-indigo-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <span className="font-semibold text-lg text-gray-400 group-hover:text-indigo-500">Click or Drag Image Here</span>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'setup') {
                return (
                    <div className="glass-panel rounded-3xl p-8 max-w-lg w-full flex flex-col items-center gap-6">
                        <h2 className="text-2xl font-bold text-gray-800">Select Difficulty</h2>
                        <div className="relative w-64 h-64 rounded-xl overflow-hidden shadow-lg border-4 border-white">
                            <img src={image.src} className="w-full h-full object-cover" alt="Preview" />
                        </div>

                        <div className="flex gap-4">
                            {[3, 4, 5].map(size => (
                                <button
                                    key={size}
                                    onClick={() => setGridSize(size)}
                                    className={`w-16 h-16 rounded-xl font-bold text-xl transition-all shadow-sm
                                        ${gridSize === size
                                            ? 'bg-indigo-600 text-white shadow-indigo-300 scale-110'
                                            : 'bg-white text-gray-600 hover:bg-gray-50'}`}
                                >
                                    {size}x{size}
                                </button>
                            ))}
                        </div>

                        <div className="flex gap-3 w-full pt-4">
                            <Button variant="secondary" onClick={() => { setImage(null); setGameState('upload'); }} className="flex-1">Back</Button>
                            <Button onClick={startGame} className="flex-1">Start Game</Button>
                        </div>
                    </div>
                );
            }

            // Game Board Calculation
            // We use background-image and background-position to create the tiles without canvas manipulation
            // This is efficient and allows for smooth CSS transitions if needed
            const percentage = 100 / (gridSize - 1);

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-2xl px-4">

                    {/* Header Controls */}
                    <div className="glass-panel rounded-2xl p-4 w-full flex justify-between items-center">
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col">
                                <span className="text-xs text-gray-400 font-bold uppercase tracking-wider">Moves</span>
                                <span className="text-2xl font-bold text-indigo-600 font-mono">{moves}</span>
                            </div>
                            <div className="flex flex-col">
                                <span className="text-xs text-gray-400 font-bold uppercase tracking-wider">Time</span>
                                <span className="text-2xl font-bold text-indigo-600 font-mono">{formatTime(time)}</span>
                            </div>
                        </div>

                        <div className="flex gap-2">
                            <Button
                                variant="ghost"
                                className="!p-2 aspect-square"
                                onMouseEnter={() => setShowOriginal(true)}
                                onMouseLeave={() => setShowOriginal(false)}
                                title="Hold to view original"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </Button>
                            <Button variant="danger" onClick={resetGame} className="text-sm">Quit</Button>
                        </div>
                    </div>

                    {/* Game Board Area */}
                    <div className="relative group">

                        {/* Puzzle Grid */}
                        <div
                            className="bg-white/50 p-2 rounded-xl shadow-2xl backdrop-blur-sm"
                            style={{
                                display: 'grid',
                                gridTemplateColumns: `repeat(${gridSize}, 1fr)`,
                                gap: '4px',
                                width: 'min(90vw, 500px)',
                                aspectRatio: '1/1',
                            }}
                        >
                            {tiles.map((tileIndex, index) => {
                                // Calculate position of this tile in the original image
                                const contentRow = Math.floor(tileIndex / gridSize);
                                const contentCol = tileIndex % gridSize;

                                const isHidden = tileIndex === (gridSize * gridSize - 1); // The last tile is the empty one

                                return (
                                    <div
                                        key={`${index}-${tileIndex}`}
                                        onClick={() => handleTileClick(index)}
                                        className={`
                                            relative w-full h-full rounded-lg overflow-hidden cursor-pointer
                                            ${isHidden && !isSolved ? 'opacity-0 cursor-default' : 'shadow-sm hover:brightness-110'}
                                            transition-all duration-200
                                        `}
                                        style={{
                                            backgroundColor: '#ddd',
                                            backgroundImage: isHidden && !isSolved ? 'none' : `url(${image.src})`,
                                            backgroundSize: `${gridSize * 100}%`,
                                            backgroundPosition: `${contentCol * percentage}% ${contentRow * percentage}%`
                                        }}
                                    >
                                        {/* Optional: Debug numbers */}
                                        {/* <span className="absolute top-1 left-1 text-xs bg-white/80 px-1 rounded">{tileIndex}</span> */}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Peek Overlay */}
                        {showOriginal && (
                            <div className="absolute inset-0 z-50 rounded-xl overflow-hidden shadow-2xl pointer-events-none animate-fade-in">
                                <img src={image.src} className="w-full h-full object-cover" />
                                <div className="absolute inset-0 bg-black/10 flex items-center justify-center">
                                    <span className="bg-black/50 text-white px-4 py-2 rounded-full text-sm font-bold backdrop-blur-md">Original Image</span>
                                </div>
                            </div>
                        )}

                        {/* Win Overlay */}
                        {gameState === 'won' && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm rounded-xl animate-fade-in">
                                <div className="bg-white p-8 rounded-3xl text-center shadow-2xl transform scale-100 animate-bounce-subtle">
                                    <div className="text-6xl mb-4">🎉</div>
                                    <h2 className="text-3xl font-bold text-indigo-900 mb-2">Puzzle Solved!</h2>
                                    <p className="text-gray-500 mb-6">Create in {moves} moves and {formatTime(time)}</p>
                                    <Button onClick={() => setGameState('setup')} className="w-full">Play Again</Button>
                                    <Button variant="secondary" onClick={resetGame} className="w-full mt-3">New Image</Button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PuzzleGame />);
    </script>
</body>

</html>
